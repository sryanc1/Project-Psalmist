<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/main.css" />
    <title>Admin — Project Psalmist</title>
  </head>
  <body>

    <header class="app-bar">
      <a href="/Project-Psalmist/" class="app-name">Project Psalmist</a>
      <nav style="display:flex; gap:1rem; align-items:center;">
        <span id="admin-email" class="text-muted" style="font-size:0.75rem;"></span>
        <button id="signout-btn" class="btn btn-outline">Sign Out</button>
      </nav>
    </header>

    <div class="piano-accent">
      <span class="wk"></span><span class="bk"></span>
      <span class="wk"></span><span class="bk"></span>
      <span class="wk"></span><span class="wk"></span>
      <span class="bk"></span><span class="wk"></span>
      <span class="bk"></span><span class="wk"></span>
      <span class="bk"></span><span class="wk"></span>
      <span class="wk"></span><span class="bk"></span>
      <span class="wk"></span><span class="bk"></span>
      <span class="wk"></span><span class="wk"></span>
      <span class="bk"></span><span class="wk"></span>
      <span class="bk"></span><span class="wk"></span>
      <span class="bk"></span><span class="wk"></span>
    </div>

    <main class="container mt-3">

      <div class="list-header">
        <h2>All Songs</h2>
        <div style="display:flex; gap:8px; align-items:center;">
          <button id="rebuild-index-btn" class="btn btn-outline">Rebuild Index</button>
          <button id="add-song-btn" class="btn btn-primary">+ Add Song</button>
        </div>
      </div>

      <div id="song-list" class="admin-song-list card mt-2">
        <div class="state-message">Loading songs...</div>
      </div>

    </main>

    <!-- ── Modal ── -->
    <div id="modal-overlay" class="modal-overlay" style="display:none;">
      <div class="modal-container">

        <div class="modal-header">
          <span id="modal-title" class="modal-title">Add New Song</span>
          <button id="modal-close" class="modal-close">✕</button>
        </div>

        <div class="piano-accent">
          <span class="wk"></span><span class="bk"></span>
          <span class="wk"></span><span class="bk"></span>
          <span class="wk"></span><span class="wk"></span>
          <span class="bk"></span><span class="wk"></span>
          <span class="bk"></span><span class="wk"></span>
          <span class="bk"></span><span class="wk"></span>
          <span class="wk"></span><span class="bk"></span>
          <span class="wk"></span><span class="bk"></span>
          <span class="wk"></span><span class="wk"></span>
          <span class="bk"></span><span class="wk"></span>
          <span class="bk"></span><span class="wk"></span>
          <span class="bk"></span><span class="wk"></span>
        </div>

        <div class="modal-body">

          <!-- Type toggle -->
          <div class="type-toggle">
            <button class="type-btn active" data-type="chorus">Chorus</button>
            <button class="type-btn" data-type="hymn">Hymn</button>
          </div>

          <!-- Meta fields -->
          <div class="form-row-4">
            <div class="form-group">
                <label for="field-number">Number</label>
                <input type="number" id="field-number" placeholder="1" min="1" />
            </div>
            <div class="form-group">
                <label for="field-title">Title</label>
                <input type="text" id="field-title" placeholder="Song title" />
            </div>
            <div class="form-group">
                <label for="field-author">Author</label>
                <input type="text" id="field-author" placeholder="Author" />
            </div>
            <div class="form-group">
                <label for="field-key">Key</label>
                <select id="field-key">
                <option value="">— none —</option>
                <option>A</option><option>Bb</option><option>B</option>
                <option>C</option><option>Db</option><option>D</option>
                <option>Eb</option><option>E</option><option>F</option>
                <option>F#</option><option>G</option><option>Ab</option>
                <option>Am</option><option>Bm</option><option>Cm</option>
                <option>Dm</option><option>Em</option><option>Fm</option>
                <option>Gm</option>
                </select>
            </div>
            </div>

          <div class="form-group mt-1">
            <label for="field-tags">Tags (comma separated)</label>
            <input type="text" id="field-tags" placeholder="grace, classic, Easter" />
          </div>

          <!-- Stanza builder -->
          <div class="stanza-section mt-2">
            <div class="section-label">Stanzas</div>
            <div id="stanza-list"></div>
            <div class="add-stanza-row mt-1">
              <button class="add-stanza-btn" data-stype="verse">+ Verse</button>
              <button class="add-stanza-btn refrain" id="btn-add-refrain"
                data-stype="refrain">+ Refrain</button>
              <button class="add-stanza-btn refrain" id="btn-add-refrain-alt"
                data-stype="refrain-alt">+ Alt Refrain</button>
            </div>
          </div>

          <div id="form-error" class="form-error" style="display:none;">
            Please add a title and at least one stanza.
          </div>

        </div>

        <div class="modal-footer">
          <button id="modal-cancel" class="btn-text">Cancel</button>
          <button id="modal-save" class="btn btn-primary">Save Song</button>
        </div>

      </div>
    </div>

    <script type="module" src="/js/admin.js"></script>

  </body>
</html>
