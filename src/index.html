<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/css/main.css" />
    <link rel="apple-touch-icon" href="/Project-Psalmist/icon-180.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Psalmist" />
    <meta name="theme-color" content="#1C1C1A" />
    <title>Project Psalmist</title>
  </head>
  <body class="app-body">

    <!-- - Drawer - -->
    <div class="drawer-overlay" id="drawer-overlay" aria-hidden="true">
      <div class="drawer" id="drawer" role="dialog" aria-label="Song index">

        <div class="drawer-head">
          <div class="drawer-header-row">
            <span class="drawer-title">Project Psalmist</span>
            <button id="drawer-close" class="drawer-close-btn mobile-only">✕</button>
          </div>
          <input
            type="text"
            id="drawer-search"
            class="drawer-search"
            placeholder="Search by number or title..."
            autocomplete="off"
          />
        </div>

        <div class="drawer-tabs">
          <button class="drawer-tab active" data-tab="choruses">Choruses</button>
          <button class="drawer-tab" data-tab="hymns">Hymns</button>
        </div>

        <div class="drawer-list" id="drawer-list">
          <div class="state-message" style="color:#9A9690;">Loading...</div>
        </div>

        <div class="drawer-footer">
          <button id="admin-link" class="drawer-admin-btn" style="display:none;">
            Admin Panel
          </button>
        </div>

      </div>
      <div class="drawer-backdrop" id="drawer-backdrop"></div>
    </div>

    <!-- - Main content - -->
    <div class="main-content">

      <header class="app-bar">
        <button id="drawer-toggle" class="app-bar-btn mobile-only" aria-label="Open song index">
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
        </button>
        <span class="app-bar-title">Project Psalmist</span>
        <div class="text-scale-controls">
          <button id="text-scale-decrease" class="text-scale-btn" aria-label="Decrease text size">−</button>
          <span class="text-scale-label">A</span>
          <button id="text-scale-increase" class="text-scale-btn" aria-label="Increase text size">+</button>
        </div>
      </header>

      <div class="piano-accent">
        <span class="wk"></span><span class="bk"></span>
        <span class="wk"></span><span class="bk"></span>
        <span class="wk"></span><span class="wk"></span>
        <span class="bk"></span><span class="wk"></span>
        <span class="bk"></span><span class="wk"></span>
        <span class="bk"></span><span class="wk"></span>
        <span class="wk"></span><span class="bk"></span>
        <span class="wk"></span><span class="bk"></span>
        <span class="wk"></span><span class="wk"></span>
        <span class="bk"></span><span class="wk"></span>
        <span class="bk"></span><span class="wk"></span>
        <span class="bk"></span><span class="wk"></span>
      </div>

      <main class="carousel-area" id="carousel-area">
        <div class="carousel-track" id="carousel-track"></div>
        <button class="carousel-arrow arrow-prev" id="arrow-prev" aria-label="Previous song">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
        <button class="carousel-arrow arrow-next" id="arrow-next" aria-label="Next song">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </button>
      </main>

      <div class="nav-dots" id="nav-dots"></div>

    </div>

    <script type="module" src="/js/ui.js"></script>

  </body>
</html>
