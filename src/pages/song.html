<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Psalmist</title>
    <script>
      const params = new URLSearchParams(window.location.search)
      const id = params.get('id')
      const base = '/Project-Psalmist/'
      if (id) {
        window.location.replace(base + '?id=' + id)
      } else {
        window.location.replace(base)
      }
    </script>
  </head>
  <body></body>
</html>
